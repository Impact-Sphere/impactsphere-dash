name: Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dash.impactsphere.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.henriquesf.me
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.henriquesf.me/impact-sphere/impact-sphere-dash:${{ github.sha }}
            registry.henriquesf.me/impact-sphere/impact-sphere-dash:latest
          build-args: |
            NEXT_PUBLIC_BETTER_AUTH_URL=${{ secrets.NEXT_PUBLIC_BETTER_AUTH_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.0' 
          cache: 'npm'
      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci;
          elif [ -f pnpm-lock.yaml ]; then corepack enable pnpm && pnpm install --frozen-lockfile;
          elif [ -f yarn.lock ]; then corepack enable yarn && yarn install --frozen-lockfile;
          else npm install; fi
